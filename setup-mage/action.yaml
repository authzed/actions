---
name: "Setup Mage"
description: "Download and install Mage"
inputs:
  version:
    description: "Version of Mage to install"
    default: "v1.15.0"
    required: false
runs:
  using: "composite"
  steps:
    - uses: "magefile/mage-action@v4"
      with:
        version: "${{ inputs.version }}"
        install-only: true
